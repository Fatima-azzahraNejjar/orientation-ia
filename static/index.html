<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Orientation IA - Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>Orientation IA </h1>
            <p>Posez vos questions sur les licences, bourses et métiers.</p>
        </header>

        <div id="chat-box" class="chat-box">
            <div class="bot-msg">Bonjour ! Je suis votre conseiller. Comment puis-je vous aider ?</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ex: Licence de Lettres à la Sorbonne...">
            <button onclick="sendMessage()">Envoyer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
